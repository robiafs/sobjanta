<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>সবজান্তা AI — যেকোনো প্রশ্নের উত্তর</title>
  <meta name="description" content="সবজান্তা AI — বাংলায় যেকোনো প্রশ্নের তাৎক্ষণিক উত্তর পান।" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple: #534AB7;
      --purple-light: #EEEDFE;
      --purple-dark: #3C3489;
      --teal: #1D9E75;
      --teal-light: #E1F5EE;
      --gray-50: #F8F8F7;
      --gray-100: #F1EFE8;
      --gray-200: #D3D1C7;
      --gray-600: #5F5E5A;
      --gray-900: #2C2C2A;
      --white: #ffffff;
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    html, body {
      height: 100%;
      font-family: 'Hind Siliguri', sans-serif;
      background: var(--gray-50);
      color: var(--gray-900);
    }

    /* ── Layout ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 800px;
      margin: 0 auto;
    }

    /* ── Header ── */
    .header {
      background: var(--white);
      border-bottom: 1px solid var(--gray-200);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: var(--shadow);
    }
    .header-logo {
      width: 42px;
      height: 42px;
      background: var(--purple);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .header-logo svg { width: 22px; height: 22px; fill: none; stroke: white; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .header-info h1 { font-size: 18px; font-weight: 600; color: var(--gray-900); }
    .header-info p { font-size: 12px; color: var(--gray-600); display: flex; align-items: center; gap: 5px; margin-top: 1px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--teal); animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    .header-actions { margin-left: auto; }
    .clear-btn {
      background: none;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-sm);
      padding: 7px 14px;
      font-size: 13px;
      font-family: inherit;
      color: var(--gray-600);
      cursor: pointer;
      transition: all 0.2s;
    }
    .clear-btn:hover { background: var(--gray-100); color: var(--gray-900); }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    /* Welcome screen */
    .welcome {
      text-align: center;
      padding: 40px 20px;
      animation: fadeIn 0.5s ease;
    }
    .welcome-icon {
      width: 72px;
      height: 72px;
      background: var(--purple-light);
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }
    .welcome-icon svg { width: 36px; height: 36px; stroke: var(--purple); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .welcome h2 { font-size: 24px; font-weight: 600; margin-bottom: 10px; }
    .welcome p { font-size: 15px; color: var(--gray-600); line-height: 1.7; max-width: 380px; margin: 0 auto 28px; }

    /* Suggestion chips */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      max-width: 560px;
      margin: 0 auto;
    }
    .sug-chip {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: 40px;
      padding: 9px 16px;
      font-size: 13px;
      font-family: inherit;
      color: var(--gray-900);
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
    }
    .sug-chip:hover { background: var(--purple-light); border-color: var(--purple); color: var(--purple); }

    /* Message bubbles */
    .msg { display: flex; gap: 10px; align-items: flex-start; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .avatar.bot { background: var(--purple); }
    .avatar.user-av { background: var(--teal-light); }
    .avatar svg { width: 16px; height: 16px; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .avatar.bot svg { stroke: white; fill: none; }
    .avatar.user-av svg { stroke: var(--teal); fill: none; }

    .bubble {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      font-size: 15px;
      line-height: 1.75;
    }
    .msg.bot .bubble {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-top-left-radius: 4px;
      color: var(--gray-900);
    }
    .msg.user .bubble {
      background: var(--purple);
      color: white;
      border-top-right-radius: 4px;
    }

    /* Typing indicator */
    .typing-dots { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
    .typing-dots span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--gray-200);
      animation: bounce 1.3s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.18s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    /* Error bubble */
    .error-bubble {
      background: #FCEBEB;
      border: 1px solid #F09595;
      border-top-left-radius: 4px;
      color: #A32D2D;
    }

    /* ── Input Area ── */
    .input-area {
      background: var(--white);
      border-top: 1px solid var(--gray-200);
      padding: 16px 20px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .input-wrap {
      flex: 1;
      background: var(--gray-50);
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-lg);
      display: flex;
      align-items: flex-end;
      padding: 10px 14px;
      transition: border-color 0.2s;
    }
    .input-wrap:focus-within { border-color: var(--purple); background: var(--white); }
    textarea {
      flex: 1;
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: 15px;
      color: var(--gray-900);
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 120px;
    }
    textarea::placeholder { color: var(--gray-200); }
    .send-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--purple);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .send-btn:hover { background: var(--purple-dark); transform: scale(1.05); }
    .send-btn:active { transform: scale(0.97); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .send-btn svg { width: 20px; height: 20px; stroke: white; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Footer ── */
    .footer {
      text-align: center;
      padding: 8px;
      font-size: 11px;
      color: var(--gray-200);
      background: var(--white);
      border-top: 1px solid var(--gray-100);
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .bubble { max-width: 88%; font-size: 14px; }
      .header-info h1 { font-size: 16px; }
      .welcome h2 { font-size: 20px; }
      .clear-btn span { display: none; }
    }
  </style>
</head>
<body>

<div class="app">

  <!-- Header -->
  <header class="header">
    <div class="header-logo">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/><path d="M9.5 3.5C7 5 5 7.5 5 10.5"/></svg>
    </div>
    <div class="header-info">
      <h1>সবজান্তা AI</h1>
      <p><span class="status-dot"></span> সচল — যেকোনো প্রশ্ন করুন</p>
    </div>
    <div class="header-actions">
      <button class="clear-btn" onclick="clearChat()">
        <svg width="14" height="14" viewBox="0 0 24 24" style="display:inline;vertical-align:-2px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;margin-right:5px"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>
        <span>নতুন চ্যাট</span>
      </button>
    </div>
  </header>

  <!-- Messages -->
  <main class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </div>
      <h2>আমি সবজান্তা! 👋</h2>
      <p>বিজ্ঞান, ইতিহাস, গণিত, প্রযুক্তি, রান্না, স্বাস্থ্য — যেকোনো বিষয়ে আমাকে জিজ্ঞেস করুন।</p>
      <div class="suggestions">
        <button class="sug-chip" onclick="sendSuggestion('বাংলাদেশের মুক্তিযুদ্ধ কত সালে হয়েছিল?')">🇧🇩 মুক্তিযুদ্ধ কত সালে?</button>
        <button class="sug-chip" onclick="sendSuggestion('পৃথিবী থেকে চাঁদের দূরত্ব কত কিলোমিটার?')">🌙 চাঁদের দূরত্ব কত?</button>
        <button class="sug-chip" onclick="sendSuggestion('ডায়াবেটিস কী এবং এর লক্ষণ কী কী?')">🏥 ডায়াবেটিসের লক্ষণ</button>
        <button class="sug-chip" onclick="sendSuggestion('পাইথন প্রোগ্রামিং শেখার সেরা উপায় কী?')">💻 পাইথন শেখার উপায়</button>
        <button class="sug-chip" onclick="sendSuggestion('বিরিয়ানি রান্নার সহজ রেসিপি দাও')">🍛 বিরিয়ানি রেসিপি</button>
        <button class="sug-chip" onclick="sendSuggestion('ভালো ঘুমের জন্য কী করতে হবে?')">😴 ভালো ঘুমের উপায়</button>
      </div>
    </div>
  </main>

  <!-- Input -->
  <div class="input-area">
    <div class="input-wrap">
      <textarea
        id="user-input"
        placeholder="আপনার প্রশ্ন এখানে লিখুন..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
    </div>
    <button class="send-btn" id="send-btn" onclick="sendMessage()" aria-label="পাঠান">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>

  <div class="footer">সবজান্তা AI — Powered by Claude · আপনার তথ্য সুরক্ষিত</div>

</div>

<script>
// =============================================
//  ⚙️  কনফিগারেশন
//  chat.php এর সঠিক পাথ দিন
// =============================================
const API_URL = '/api/chat';

let conversationHistory = [];
let isLoading = false;

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const welcomeEl = document.getElementById('welcome');

// SVG icons
const BOT_ICON = `<svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/><circle cx="9" cy="16" r="1" fill="white"/><circle cx="15" cy="16" r="1" fill="white"/></svg>`;
const USER_ICON = `<svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function scrollDown() {
  messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' });
}

function hideWelcome() {
  if (welcomeEl) welcomeEl.style.display = 'none';
}

function addMessage(role, text, isError = false) {
  const msg = document.createElement('div');
  msg.className = 'msg ' + (role === 'user' ? 'user' : 'bot');

  const avatarClass = role === 'user' ? 'user-av' : 'bot';
  const icon = role === 'user' ? USER_ICON : BOT_ICON;

  const bubbleClass = isError ? 'bubble error-bubble' : 'bubble';
  const formatted = text.replace(/\n/g, '<br>');

  msg.innerHTML = `
    <div class="avatar ${avatarClass}">${icon}</div>
    <div class="${bubbleClass}">${formatted}</div>
  `;
  messagesEl.appendChild(msg);
  scrollDown();
  return msg;
}

function addTyping() {
  const msg = document.createElement('div');
  msg.className = 'msg bot';
  msg.id = 'typing';
  msg.innerHTML = `
    <div class="avatar bot">${BOT_ICON}</div>
    <div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>
  `;
  messagesEl.appendChild(msg);
  scrollDown();
}

function removeTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function sendSuggestion(text) {
  inputEl.value = text;
  sendMessage();
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isLoading) return;

  hideWelcome();
  isLoading = true;
  sendBtn.disabled = true;
  inputEl.value = '';
  inputEl.style.height = 'auto';

  // User message দেখাও
  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  // Typing দেখাও
  addTyping();

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: conversationHistory }),
    });

    const data = await res.json();
    removeTyping();

    if (!res.ok || data.error) {
      addMessage('bot', '⚠️ ' + (data.error || 'সার্ভারে সমস্যা হয়েছে। আবার চেষ্টা করুন।'), true);
    } else {
      conversationHistory.push({ role: 'assistant', content: data.reply });
      addMessage('bot', data.reply);
    }
  } catch (err) {
    removeTyping();
    addMessage('bot', '⚠️ ইন্টারনেট সংযোগ বা সার্ভারে সমস্যা। একটু পরে আবার চেষ্টা করুন।', true);
  }

  isLoading = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

function clearChat() {
  conversationHistory = [];
  // Welcome স্ক্রিন ফিরিয়ে আনো
  messagesEl.innerHTML = `
    <div class="welcome" id="welcome">
      <div class="welcome-icon">
        <svg viewBox="0 0 24 24" style="width:36px;height:36px;stroke:#534AB7;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </div>
      <h2>আমি সবজান্তা! 👋</h2>
      <p>বিজ্ঞান, ইতিহাস, গণিত, প্রযুক্তি, রান্না, স্বাস্থ্য — যেকোনো বিষয়ে আমাকে জিজ্ঞেস করুন।</p>
      <div class="suggestions">
        <button class="sug-chip" onclick="sendSuggestion('বাংলাদেশের মুক্তিযুদ্ধ কত সালে হয়েছিল?')">🇧🇩 মুক্তিযুদ্ধ কত সালে?</button>
        <button class="sug-chip" onclick="sendSuggestion('পৃথিবী থেকে চাঁদের দূরত্ব কত কিলোমিটার?')">🌙 চাঁদের দূরত্ব কত?</button>
        <button class="sug-chip" onclick="sendSuggestion('ডায়াবেটিস কী এবং এর লক্ষণ কী কী?')">🏥 ডায়াবেটিসের লক্ষণ</button>
        <button class="sug-chip" onclick="sendSuggestion('পাইথন প্রোগ্রামিং শেখার সেরা উপায় কী?')">💻 পাইথন শেখার উপায়</button>
        <button class="sug-chip" onclick="sendSuggestion('বিরিয়ানি রান্নার সহজ রেসিপি দাও')">🍛 বিরিয়ানি রেসিপি</button>
        <button class="sug-chip" onclick="sendSuggestion('ভালো ঘুমের জন্য কী করতে হবে?')">😴 ভালো ঘুমের উপায়</button>
      </div>
    </div>`;
  inputEl.focus();
}

// Focus on load
window.onload = () => inputEl.focus();
</script>
</body>
</html>
